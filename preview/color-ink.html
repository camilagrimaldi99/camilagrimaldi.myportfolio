<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Ink scale" subtitle="Warm near-black text scale" viewport="700x165" -->
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--paper); padding: 32px 40px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .sw { display: flex; flex-direction: column; gap: 10px; }
  .chip { height: 78px; border: 1px solid var(--hairline); }
  .nm { font-family: var(--font-sans); font-weight: 500; font-size: 11.5px; letter-spacing: 0.04em; color: var(--ink); }
  .hex { font-family: var(--font-sans); font-size: 11px; color: var(--ink-3); }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink)"></div><span class="nm">ink</span><span class="hex">#2A2723</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-2)"></div><span class="nm">ink-2</span><span class="hex">#5C5751</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-3)"></div><span class="nm">ink-3</span><span class="hex">#86817A</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-4)"></div><span class="nm">ink-4</span><span class="hex">#ADA9A2</span></div>
  </div>
</body></html>
