<!DOCTYPE html>
<!-- @dsCard group="Type" name="Heading scale" subtitle="H1/H2 serif · H3 grotesque" viewport="700x230" -->
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--paper); padding: 32px 40px; }
  .stack { display: flex; flex-direction: column; gap: 20px; }
  .item { display: flex; align-items: baseline; gap: 20px; }
  .tag { font-family: var(--font-sans); font-weight: 500; font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-4); width: 88px; flex: none; }
  h1,h2,h3 { margin: 0; }
  h1 { font-family: var(--font-display); font-weight: 300; font-size: 46px; line-height: 1.04; letter-spacing: -0.01em; color: var(--ink); }
  h2 { font-family: var(--font-display); font-weight: 400; font-size: 32px; line-height: 1.1; color: var(--ink); }
  h3 { font-family: var(--font-sans); font-weight: 500; font-size: 20px; color: var(--ink); }
</style></head>
<body>
  <div class="stack">
    <div class="item"><span class="tag">H1 · serif 300</span><h1>Casa sul Margine</h1></div>
    <div class="item"><span class="tag">H2 · serif 400</span><h2>Selected Works</h2></div>
    <div class="item"><span class="tag">H3 · sans 500</span><h3>Concept &amp; Approach</h3></div>
  </div>
</body></html>
