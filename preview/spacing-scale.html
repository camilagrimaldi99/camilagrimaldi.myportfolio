<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Spacing scale" subtitle="8px base; large section rhythm" viewport="700x270" -->
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--paper); padding: 32px 40px; }
  .scale { display: flex; flex-direction: column; gap: 11px; }
  .r { display: flex; align-items: center; gap: 18px; }
  .bar { height: 14px; background: var(--ink); }
  .nm { font-family: var(--font-sans); font-weight: 500; font-size: 11px; letter-spacing: 0.04em; color: var(--ink); width: 78px; flex: none; }
  .px { font-family: var(--font-sans); font-size: 11px; color: var(--ink-3); }
</style></head>
<body>
  <div class="scale">
    <div class="r"><span class="nm">space-2</span><div class="bar" style="width:8px"></div><span class="px">8</span></div>
    <div class="r"><span class="nm">space-4</span><div class="bar" style="width:16px"></div><span class="px">16</span></div>
    <div class="r"><span class="nm">space-5</span><div class="bar" style="width:24px"></div><span class="px">24</span></div>
    <div class="r"><span class="nm">space-6</span><div class="bar" style="width:32px"></div><span class="px">32</span></div>
    <div class="r"><span class="nm">space-7</span><div class="bar" style="width:48px"></div><span class="px">48</span></div>
    <div class="r"><span class="nm">space-8</span><div class="bar" style="width:64px"></div><span class="px">64</span></div>
    <div class="r"><span class="nm">space-9</span><div class="bar" style="width:96px"></div><span class="px">96 — section rhythm</span></div>
    <div class="r"><span class="nm">space-10</span><div class="bar" style="width:128px"></div><span class="px">128 — section rhythm</span></div>
  </div>
</body></html>
