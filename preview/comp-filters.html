<!DOCTYPE html>
<!-- @dsCard group="Components" name="Program filters" subtitle="Typology chips" viewport="700x180" -->
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--paper); padding: 30px 40px; display: flex; flex-direction: column; gap: 22px; }
  .cap { font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-4); }
  .filters { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { font-family: var(--font-sans); font-weight: 500; font-size: 11.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3); padding: 9px 16px; border: 1px solid var(--hairline); background: transparent; cursor: pointer; transition: all var(--dur-ui); border-radius: var(--r-0); }
  .chip:hover { border-color: var(--hairline-strong); color: var(--ink); }
  .chip.active { background: var(--ink); border-color: var(--ink); color: var(--on-ink); }
  .row { display:flex; gap: 24px; align-items: baseline; }
  .count { font-family: var(--font-sans); font-size: 12px; color: var(--ink-3); }
</style></head>
<body>
  <span class="cap">Program filters</span>
  <div class="filters">
    <button class="chip active">All</button>
    <button class="chip">Architecture</button>
    <button class="chip">Adaptive Reuse</button>
    <button class="chip">Hospitality</button>
    <button class="chip">Landscape</button>
    <button class="chip">Interiors</button>
  </div>
  <span class="count">8 projects · 2019—2025</span>
</body></html>
