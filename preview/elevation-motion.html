<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Elevation & motion" subtitle="Flat by default; slow restrained motion" viewport="700x220" -->
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--paper); padding: 34px 40px; display: flex; gap: 56px; align-items: flex-start; }
  .col { display: flex; flex-direction: column; gap: 18px; }
  .lab { font-family: var(--font-sans); font-weight: 500; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-3); }
  .flat { width: 150px; height: 86px; background: var(--paper); border: 1px solid var(--hairline); }
  .over { width: 150px; height: 86px; background: var(--paper); box-shadow: var(--shadow-overlay); }
  .cap { font-family: var(--font-sans); font-size: 11.5px; color: var(--ink-3); margin-top: 10px; max-width: 160px; line-height: 1.5; }
  .note { font-family: var(--font-sans); font-size: 12px; line-height: 1.55; color: var(--ink-2); max-width: 240px; }
  .note b { color: var(--ink); font-weight: 500; }
</style></head>
<body>
  <div class="col">
    <span class="lab">Default — flat</span>
    <div class="flat"></div>
    <span class="cap">No drop shadow. Separation by hairline + tonal panel.</span>
  </div>
  <div class="col">
    <span class="lab">Overlay only</span>
    <div class="over"></div>
    <span class="cap">shadow-overlay — reserved for menus &amp; lightbox.</span>
  </div>
  <div class="col">
    <span class="lab">Motion</span>
    <p class="note"><b>dur-ui 0.22s</b> — hovers, states.<br><b>dur-reveal 0.7s</b> — image reveals, fades.<br>ease-out curve. <b>No bounce, no parallax.</b></p>
  </div>
</body></html>
