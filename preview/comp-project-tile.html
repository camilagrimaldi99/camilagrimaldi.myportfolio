<!DOCTYPE html>
<!-- @dsCard group="Components" name="Project tile" subtitle="Index cell — plate + meta line" viewport="700x360" -->
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--paper); padding: 30px 40px; }
  .tile { display: flex; flex-direction: column; gap: 14px; max-width: 360px; cursor: pointer; }
  .plate { position: relative; aspect-ratio: 4 / 3; background:
      repeating-linear-gradient(135deg, var(--paper-3) 0 2px, transparent 2px 11px), var(--paper-2);
    border: 1px solid var(--hairline); display: flex; align-items: center; justify-content: center; transition: opacity var(--dur-ui); }
  .tile:hover .plate { opacity: 0.86; }
  .plate .pl { font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-4); }
  .tick { position: absolute; width: 9px; height: 9px; border: 1px solid var(--ink-4); }
  .tick.tl { top: 10px; left: 10px; border-right: 0; border-bottom: 0; }
  .tick.br { bottom: 10px; right: 10px; border-left: 0; border-top: 0; }
  .meta { display: flex; align-items: baseline; justify-content: space-between; gap: 14px; }
  .ttl { font-family: var(--font-display); font-weight: 400; font-size: 21px; color: var(--ink); }
  .loc { font-family: var(--font-sans); font-size: 12px; color: var(--ink-3); }
  .prog { font-family: var(--font-sans); font-weight: 500; font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }
</style></head>
<body>
  <div class="tile">
    <div class="plate">
      <span class="tick tl"></span><span class="tick br"></span>
      <span class="pl">Project plate</span>
    </div>
    <div>
      <div class="meta">
        <span class="ttl">Casa sul Margine</span>
        <span class="loc">2024</span>
      </div>
      <div class="meta" style="margin-top:6px">
        <span class="prog">Adaptive Reuse</span>
        <span class="loc">Milano, IT</span>
      </div>
    </div>
  </div>
</body></html>
